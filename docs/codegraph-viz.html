<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Codegraph Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;flex-direction:column;height:100vh;font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0}
header{padding:10px 16px;background:#16213e;border-bottom:1px solid #0f3460;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600;color:#e94560;white-space:nowrap}
.stats{font-size:11px;color:#888}
#search{padding:5px 10px;border-radius:4px;border:1px solid #0f3460;background:#0d1b2a;color:#e0e0e0;font-size:12px;width:200px}
#search::placeholder{color:#555}
.controls{display:flex;gap:8px;align-items:center}
select,button{padding:5px 10px;border-radius:4px;border:1px solid #0f3460;background:#0d1b2a;color:#e0e0e0;font-size:11px;cursor:pointer}
button:hover{background:#1a3a5c}
.tabs{display:flex;gap:4px}
.tab-btn{font-size:11px;padding:5px 11px;border-radius:5px 5px 0 0;border:1px solid #0f3460;border-bottom:none;background:#0d1b2a;color:#9aa}
.tab-btn.active{background:#e94560;color:#fff;border-color:#e94560;font-weight:600}
.legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.lg-sec{font-size:10px;color:#888}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;cursor:pointer;user-select:none}
.legend-dot-node{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-dot-edge{width:16px;height:2px;flex-shrink:0}
.legend-item.dimmed{opacity:.3}
.main{display:flex;flex:1;overflow:hidden}
#cy{flex:1}
#panel{width:270px;background:#16213e;border-left:1px solid #0f3460;padding:14px;overflow-y:auto;font-size:12px;flex-shrink:0}
#panel h2{font-size:13px;color:#4A90D9;margin-bottom:10px}
.row{margin-bottom:7px}
.lbl{color:#888;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.val{color:#e0e0e0;word-break:break-all;margin-top:2px}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:bold;color:#fff}
#nb-list .nb-item{padding:4px 6px;border-radius:3px;margin-bottom:3px;cursor:pointer;font-size:11px;background:#0d1b2a}
#nb-list .nb-item:hover{background:#1a3a5c}
.nb-edge{color:#888;font-size:10px}
#empty-panel{color:#555;font-size:12px;margin-top:20px}
</style>
</head>
<body>
<header>
  <h1>⬡ Codegraph Visualizer</h1>
  <span class="stats" id="stats">161 code · 99 edges</span>
  <input id="search" type="text" placeholder="심볼 이름 검색...">
  <div class="controls">
    <select id="layout-select">
      <option value="cose" selected>CoSE (포스)</option>
      <option value="dagre">Dagre (계층)</option>
      <option value="grid">Grid</option>
      <option value="circle">Circle</option>
      <option value="breadthfirst">BFS</option>
    </select>
    <button id="fit-btn">맞춤</button>
    <button id="reset-btn">초기화</button>
  </div>
  
  <div class="legend" id="legend"></div>
</header>
<div class="main">
  <div id="cy"></div>
  <div id="panel">
    <h2>심볼 상세</h2>
    <div id="empty-panel">노드를 클릭하면<br>상세 정보가 표시됩니다.</div>
    <div id="detail" style="display:none">
      <div class="row"><div class="lbl">이름</div><div class="val" id="d-name"></div></div>
      <div class="row"><div class="lbl">종류</div><span id="d-kind" class="badge"></span></div>
      <div class="row"><div class="lbl">파일</div><div class="val" id="d-file"></div></div>
      <div class="row"><div class="lbl">라인</div><div class="val" id="d-line"></div></div>
      <div class="row" id="d-sig-row"><div class="lbl">시그니처</div><div class="val" id="d-sig"></div></div>
      <div id="neighbors" style="margin-top:10px">
        <div class="lbl" style="margin-bottom:6px">연결 노드</div>
        <div id="nb-list"></div>
      </div>
    </div>
  </div>
</div>

const TAB_LEGEND={"combined":{"nodes":["class","interface"],"edges":["calls","instantiates","implements"]},"code":{"nodes":["class","interface"],"edges":["calls","instantiates","implements"]},"md":{"nodes":[],"edges":[]}};
const KIND_COLOR={"class":"#4A90D9","interface":"#00BCD4","struct":"#4CAF50","enum":"#FF9800","method":"#9C27B0","doc":"#5C6BC0","concept":"#EC407A"};
const KIND_LABEL={"class":"Class","interface":"Interface","struct":"Struct","enum":"Enum","method":"Method","doc":"Doc","concept":"Concept"};
const EDGE_COLOR={"calls":"#E53935","instantiates":"#FF9800","implements":"#00BCD4","imports":"#78909C","doc_link":"#26A69A","governs":"#FFCA28"};
const SHOW_TABS=false;
let activeTab='combined';
const hiddenKinds=new Set(), hiddenEdges=new Set();

const cy=cytoscape({
  container:document.getElementById('cy'),
  elements:GRAPH_DATA,
  style:[
    {selector:'node',style:{label:'data(label)','background-color':'data(color)',color:'#fff','font-size':'10px','text-valign':'center','text-halign':'center',width:'label',height:'label',padding:'7px',shape:'roundrectangle','text-wrap':'wrap','text-max-width':'120px','border-width':0}},
    {selector:'node[mdlayer="md"]',style:{shape:'ellipse'}},
    {selector:'node[kind="concept"]',style:{shape:'diamond'}},
    {selector:'node:selected',style:{'border-width':2,'border-color':'#fff'}},
    {selector:'node.highlighted',style:{'border-width':2,'border-color':'#FFD600',opacity:1}},
    {selector:'node.dimmed',style:{opacity:0.12}},
    {selector:'edge',style:{'line-color':'data(color)','target-arrow-color':'data(color)','target-arrow-shape':'triangle','curve-style':'bezier',width:1.5,opacity:0.65,'arrow-scale':0.8}},
    {selector:'edge[elayer="bridge"]',style:{'line-style':'dashed'}},
    {selector:'edge.dimmed',style:{opacity:0.04}},
    {selector:'edge.highlighted',style:{opacity:1,width:2.5}},
  ],
  layout:{name:'cose',animate:false,randomize:true,nodeRepulsion:8192,idealEdgeLength:120,gravity:0.8},
  wheelSensitivity:0.5, minZoom:0.05, maxZoom:8,
  userZoomingEnabled:true, userPanningEnabled:true,
});
document.getElementById('cy').addEventListener('wheel',function(e){e.preventDefault();},{passive:false});

function tabHasNode(tab,n){ return tab==='combined' || n.data('mdlayer')===tab; }
function tabHasEdge(tab,e){ return tab==='combined' || e.data('elayer')===tab; }

function applyVisibility(){
  const vis=new Map();
  cy.nodes().forEach(function(n){ vis.set(n.id(), tabHasNode(activeTab,n) && !hiddenKinds.has(n.data('kind'))); });
  cy.batch(function(){
    cy.nodes().forEach(function(n){ vis.get(n.id())?n.show():n.hide(); });
    cy.edges().forEach(function(e){
      var ok = tabHasEdge(activeTab,e) && !hiddenEdges.has(e.data('kind')) && vis.get(e.source().id()) && vis.get(e.target().id());
      ok?e.show():e.hide();
    });
  });
}

const LAYOUTS={cose:{name:'cose',animate:true,animationDuration:400,randomize:true,nodeRepulsion:8192,idealEdgeLength:120,gravity:0.8},dagre:{name:'dagre',rankDir:'TB',animate:true,animationDuration:400},grid:{name:'grid',animate:true,animationDuration:300},circle:{name:'circle',animate:true,animationDuration:300},breadthfirst:{name:'breadthfirst',animate:true,animationDuration:300}};
function relayout(){
  var n=document.getElementById('layout-select').value;
  cy.elements(':visible').layout(LAYOUTS[n]||LAYOUTS.cose).run();
}
function updateStats(){
  document.getElementById('stats').textContent=cy.nodes(':visible').length+' nodes · '+cy.edges(':visible').length+' edges';
}
function buildLegend(){
  var cfg=TAB_LEGEND[activeTab]||{nodes:[],edges:[]};
  var html='<span class="lg-sec">노드:</span>';
  cfg.nodes.forEach(function(k){
    var dim=hiddenKinds.has(k)?' dimmed':'';
    html+='<div class="legend-item'+dim+'" data-kind="'+k+'"><div class="legend-dot-node" style="background:'+(KIND_COLOR[k]||'#78909C')+'"></div>'+(KIND_LABEL[k]||k)+'</div>';
  });
  if(cfg.edges.length){
    html+='<span class="lg-sec" style="margin-left:6px">엣지:</span>';
    cfg.edges.forEach(function(k){
      var dim=hiddenEdges.has(k)?' dimmed':'';
      html+='<div class="legend-item'+dim+'" data-edge="'+k+'"><div class="legend-dot-edge" style="background:'+(EDGE_COLOR[k]||'#BDBDBD')+'"></div>'+k+'</div>';
    });
  }
  var lg=document.getElementById('legend');
  lg.innerHTML=html;
  lg.querySelectorAll('.legend-item[data-kind]').forEach(function(el){
    el.addEventListener('click',function(){ var k=el.dataset.kind; if(hiddenKinds.has(k))hiddenKinds.delete(k);else hiddenKinds.add(k); el.classList.toggle('dimmed'); applyVisibility(); updateStats(); });
  });
  lg.querySelectorAll('.legend-item[data-edge]').forEach(function(el){
    el.addEventListener('click',function(){ var k=el.dataset.edge; if(hiddenEdges.has(k))hiddenEdges.delete(k);else hiddenEdges.add(k); el.classList.toggle('dimmed'); applyVisibility(); updateStats(); });
  });
}
function resetPanel(){ document.getElementById('detail').style.display='none'; document.getElementById('empty-panel').style.display=''; }

function setTab(tab,initial){
  activeTab=tab; hiddenKinds.clear(); hiddenEdges.clear();
  if(SHOW_TABS){ document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); }); }
  cy.elements().removeClass('highlighted dimmed');
  resetPanel();
  applyVisibility(); buildLegend(); updateStats();
  if(!initial){ relayout(); setTimeout(function(){ cy.fit(40); }, 460); }
}

document.querySelectorAll('.tab-btn').forEach(function(b){
  b.addEventListener('click',function(){ setTab(b.dataset.tab,false); });
});
document.getElementById('layout-select').addEventListener('change',function(){ relayout(); });
document.getElementById('fit-btn').addEventListener('click',function(){ cy.fit(40); });
document.getElementById('reset-btn').addEventListener('click',function(){ setTab(activeTab,false); });
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase().trim();
  cy.elements().removeClass('highlighted dimmed');
  if(!q)return;
  var m=cy.nodes(':visible').filter(function(n){ return n.data('label').toLowerCase().includes(q); });
  if(!m.length)return;
  cy.elements(':visible').addClass('dimmed');
  m.addClass('highlighted').removeClass('dimmed');
  m.connectedEdges(':visible').addClass('highlighted').removeClass('dimmed');
  cy.animate({fit:{eles:m,padding:60},duration:400});
});
cy.on('tap','node',function(e){
  var n=e.target,d=n.data();
  document.getElementById('empty-panel').style.display='none';
  document.getElementById('detail').style.display='';
  document.getElementById('d-name').textContent=d.qualifiedName||d.label;
  var b=document.getElementById('d-kind');b.textContent=d.kind;b.style.background=d.color;
  document.getElementById('d-file').textContent=d.file||'-';
  document.getElementById('d-line').textContent=d.line?('L'+d.line+'-L'+d.endLine):'-';
  var sr=document.getElementById('d-sig-row');
  if(d.signature){document.getElementById('d-sig').textContent=d.signature;sr.style.display='';}else sr.style.display='none';
  var nb=document.getElementById('nb-list');nb.innerHTML='';
  n.connectedEdges(':visible').forEach(function(edge){
    var o=edge.source().id()===n.id()?edge.target():edge.source();
    var dir=edge.source().id()===n.id()?'→':'←';
    var div=document.createElement('div');div.className='nb-item';
    div.innerHTML=dir+' <b>'+o.data('label')+'</b> <span class="nb-edge">'+edge.data('kind')+'</span>';
    div.onclick=function(){cy.animate({center:{eles:o},zoom:cy.zoom()},{duration:300});o.select();};
    nb.appendChild(div);
  });
  cy.elements(':visible').addClass('dimmed');
  n.addClass('highlighted').removeClass('dimmed');
  n.connectedEdges(':visible').addClass('highlighted').removeClass('dimmed');
  n.neighborhood().nodes().removeClass('dimmed');
});
cy.on('tap',function(e){
  if(e.target!==cy)return;
  cy.elements().removeClass('highlighted dimmed');
  resetPanel();
});

setTab('combined',true);
